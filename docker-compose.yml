services:
  shogun-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shogun-relay-stack
    ports:
      - "8765:8765" # Relay Server
      - "5001:5001" # IPFS API
      - "8080:8080" # IPFS Gateway
      - "4001:4001" # IPFS Swarm
    volumes:
      # Persist IPFS data
      - ipfs-data:/data/ipfs
      # Persist relay data
      - relay-data:/app/relay/data
      # Mount logs for debugging
      - ./logs:/var/log/supervisor
    environment:
      - NODE_ENV=production
      - IPFS_PATH=/data/ipfs
      - DATA_DIR=/app/relay/data
      - ADMIN_PASSWORD=shogun2025
      - RELAY_HOST=localhost
      - RELAY_PORT=8765
      - RELAY_STORE=true
      - RELAY_PATH=public
      - RELAY_QR=true
      - RELAY_NAME=OP1
      - RELAY_PEERS=wss://shogun-relay.scobrudot.dev/gun
      - RELAY_PROTECTED=false
      - IPFS_API_URL=http://127.0.0.1:5001
      - IPFS_GATEWAY_URL=http://127.0.0.1:8080
      - IPFS_API_TOKEN=shogun2025
      - IPFS_API_KEY=shogun2025
      - DISABLE_RADISK=false
      # x402 Payment Configuration
      - WALLET_ADDRESS=0xYourWalletAddressHere
      # x402 Network: "base", "base-sepolia", "ethereum", etc.
      # Default: "base-sepolia" (testnet, compatible with local facilitator)
      - X402_NETWORK=base-sepolia
      # Facilitator URL: leave empty to use local facilitator, or set to external URL
      # Local facilitator will be available at http://localhost:8765/api/v1/x402-facilitator
      - FACILITATOR_URL=
      # Private key for EVM networks (Base, Base Sepolia, Ethereum)
      # Required for local facilitator to settle payments
      # Use EVM_PRIVATE_KEY or WALLET_PRIVATE_KEY (both work)
      - EVM_PRIVATE_KEY=
      # Optional: Private key for Solana networks (for SVM support)
      - SVM_PRIVATE_KEY=
      # Optional: Custom RPC URL for Solana
      - SVM_RPC_URL=
      # Relay User Authentication
      - RELAY_USER=relay_admin
      - RELAY_PASSWORD=shogun2025
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - shogun-network

volumes:
  ipfs-data:
    driver: local
  relay-data:
    driver: local

networks:
  shogun-network:
    driver: bridge
